# AI-searchable metadata for template discovery
metadata:
  description: Debian 13 minimal raw image with initrd hello hook via dracut-core (GRUB)
  use_cases:
    - Validating custom dracut module scripts on Debian GRUB raw images
    - Lightweight Debian with early-boot initrd marker
  keywords:
    - bb
    - dracut
    - dracut-core
    - initrd
    - hello
    - debian
    - grub
    - raw

image:
  name: bb-os-image-debian-dracut
  version: "13.0"

target:
  os: debian
  dist: debian13
  arch: x86_64
  imageType: raw

disk:
  name: Minimal_Raw # 1:1 mapping to the systemConfigs name
  artifacts:
    -
      type: raw  # image file format, valid value [raw, vhd, vhdx, qcow2, vmdk, vdi]
      compression: gz # image compression format (optional)
    - type: vhdx
  size: 4GiB # 4G, 4GB, 4096 MiB also valid. (Required for raw)
  partitionTableType: gpt # Partition table type, valid value: [gpt, mbr]
  partitions: # Required for raw, optional for ISO, not needed for rootfs.
    - id: boot
      type: esp
      flags:
        - esp
        - boot
      start: 1MiB
      end: 513MiB
      fsType: fat32
      mountPoint: /boot/efi
      mountOptions: umask=0077

    - id: rootfs
      type: linux-root-amd64
      start: 513MiB
      end: "0"
      fsType: ext4
      mountPoint: /
      mountOptions: defaults

systemConfig:
  name: bb-dracut
  description: Minimal debian raw image with initrd hello (dracut-core, GRUB)

  bootloader:
    bootType: efi
    provider: grub

  immutability:
    enabled: false

  packages:
    - apparmor
    - apt-listchanges
    - apt-utils
    - bash-completion
    - bind9-host
    - cloud-init
    - curl
    - dbus
    - dosfstools
    - dracut
    - dracut-core
    - firmware-intel-graphics
    - firmware-intel-misc
    - firmware-iwlwifi
    - grub-cloud-amd64
    - init
    - iptables
    - iputils-ping
    - less
    - libext2fs2t64
    - liblastlog2-2
    - libnss-myhostname
    - libnss-resolve
    - libpam-modules-bin
    - libpam-systemd
    - libss2
    - linux-sysctl-defaults
    - man-db
    - manpages
    - mawk
    - nano
    - netplan.io
    - pciutils
    - polkitd
    - psmisc
    - python3-minimal
    - reportbug
    - wireless-regdb
    - screen
    - socat
    - ssh-import-id
    - sudo
    - tcpdump
    - traceroute
    - unattended-upgrades
    - uuid-runtime
    - vim
    - vim-tiny
    - whiptail
    - zstd

  additionalFiles:
    - local: additionalfiles/debian13-bb-dracut/modules.d/91hello/module-setup.sh
      final: /usr/lib/dracut/modules.d/91hello/module-setup.sh
    - local: additionalfiles/debian13-bb-dracut/modules.d/91hello/hello.sh
      final: /usr/lib/dracut/modules.d/91hello/hello.sh
    - local: additionalfiles/debian13-bb-dracut/modules.d/91hello/initqueue-sample.sh
      final: /usr/lib/dracut/modules.d/91hello/initqueue-sample.sh

  configurations:
    - cmd: 'mkdir -p /etc/dracut.conf.d && echo ''add_dracutmodules+=" hello "'' > /etc/dracut.conf.d/91hello.conf'
    - cmd: "chmod 755 /usr/lib/dracut/modules.d/91hello/module-setup.sh /usr/lib/dracut/modules.d/91hello/hello.sh /usr/lib/dracut/modules.d/91hello/initqueue-sample.sh"

  kernel:
    version: "6.12.74"
    cmdline: "console=ttyS0,115200 console=tty0 loglevel=7 rd.debug rd.info"
    packages:
      - linux-image-amd64