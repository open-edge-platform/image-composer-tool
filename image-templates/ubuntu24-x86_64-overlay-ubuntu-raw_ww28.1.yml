# Overlay template: upgrade a set of already-installed baseline packages to their
# WW28.1 versions on top of an existing Ubuntu 24.04 RAW image, without rebuilding
# from scratch.
#
# This uses the overlay "additive-and-upgrade" policy: a package LISTED BELOW that
# is already present in the baseline is re-resolved against the repositories and,
# when a strictly newer version is available, upgraded in place. Upgrade scope is
# bounded — a package is upgraded only if it is named here, or if a package being
# installed requires a newer version of it (a versioned dependency the baseline
# copy fails); an unrequested transitive dependency that merely has a newer
# version in the repo is left on its baseline version, so listing a package does
# not silently drag core libraries along with it. Downgrades and removals stay
# blocked, and the bootable kernel image is immutable (boot regeneration refreshes
# only the initramfs, not the bootloader menu).

# AI-searchable metadata for template discovery
metadata:
  description: Overlay-upgrade an Ubuntu 24.04 RAW image to WW28.1 package versions
  use_cases:
    - Upgrade baseline packages to a newer weekly (WW28.1) without a full rebuild
    - Incremental security/version bump of a golden image
  keywords:
    - overlay
    - upgrade
    - additive-and-upgrade
    - ubuntu
    - raw
    - ww28

image:
  name: ubuntu-overlay-ww28-1
  version: "24.04"

target:
  os: ubuntu
  dist: ubuntu24
  arch: x86_64
  imageType: raw

# Overlay mode: layer package upgrades onto an existing baseline RAW image. The
# source image is copied into the build workspace first and is never modified in
# place. Replace the path with your WW27.1 baseline image.
baseline:
  mode: overlay
  source:
    path: ubuntu-desktop-24.04.4-custom.img 
    format: raw

# additive-and-upgrade: in addition to adding new packages, upgrade a package
# already installed in the baseline to a newer version. Downgrades and removals
# remain blocked; a conflict still fails the preflight gate.
overlayPolicy:
  packageOperation: additive-and-upgrade
  conflictPolicy: fail

# Repositories the upgrades are resolved from. The Ubuntu base/updates/security
# repositories are supplied automatically by the ubuntu24 provider config and are
# merged in, so the base-OS packages below (curl, vim, ncurses, libnss3, hplip,
# cifs-utils, libsqlite3, libssh2, libnghttp2) resolve to their published
# noble-updates / noble-security versions with no entry needed here.
#
# The Intel AREL3 repo below carries the Intel-published packages (linux-firmware
# and the linux-libc-dev etc.). It keeps an allowPackages allowlist so only these packages
# are pulled from it.
packageRepositories:
  - codename: "noble"
    url: "https://af01p-png.devtools.intel.com/artifactory/hspe-edge-png-local/ubuntu/noble/noble/20260617-1608_2026_SW_A_REL3_RC01"
    pkey: "https://af01p-png.devtools.intel.com/artifactory/hspe-edge-png-local/ubuntu/keys/adl-hirsute-public.gpg"
    component: "main non-free multimedia internal"
    priority: 2000
    allowPackages:
      - linux-firmware
      - linux-libc-dev

systemConfig:
  name: overlay
  description: Ubuntu 24.04 baseline upgraded to WW28.1 package versions
  users:
    - name: user
      password: user1234
      groups: ["sudo"]
  # The packages to upgrade to WW28.1. Each is already present in the baseline at
  # its WW27.1 version; the overlay re-resolves it and upgrades to the newer
  # version the repositories publish. A package already at (or above) the newest
  # available version is left untouched — this list is safe to over-specify.
  packages:
    # curl + libs
    - curl
    - libcurl3t64-gnutls
    - libcurl4t64
    - libnghttp2-14
    - libssh2-1t64
    # ncurses stack
    - libncurses6
    - libncursesw6
    - libtinfo6
    - ncurses-base
    - ncurses-bin
    - ncurses-term
    # nss / sqlite
    - libnss3
    - libsqlite3-0
    # hplip / printing
    - hplip
    - hplip-data
    - libhpmud0
    - libsane-hpaio
    - printer-driver-hpcups
    - printer-driver-postscript-hp
    # vim
    - vim
    - vim-common
    - vim-runtime
    - vim-tiny
    - xxd
    # misc
    - cifs-utils
    # Intel / kernel-adjacent (from the AREL3 repo allowlist above)
    - linux-firmware
    - linux-libc-dev
