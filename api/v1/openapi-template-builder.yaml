openapi: 3.0.3
info:
  title: ICT Template Builder API
  description: |
    Backend API for the Image Composer Tool (ICT) web-based template builder.
    Provides endpoints for composing image templates from building blocks,
    validating templates, managing saved templates, and triggering image builds.
  version: 1.0.0
  contact:
    name: ICT Team

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

tags:
  - name: Building Blocks
    description: Retrieve available options for each template building block (OS, packages, disk presets, etc.)
  - name: Templates
    description: CRUD operations on image templates
  - name: Validation
    description: Validate templates against the ICT schema
  - name: Builds
    description: Trigger and monitor image builds
  - name: Packages
    description: Search and discover packages available for a target

paths:
  # ─────────────────────────────────────────────────────────────────────
  # Building Blocks - what the UI offers the user to pick from
  # ─────────────────────────────────────────────────────────────────────

  /blocks/targets:
    get:
      tags: [Building Blocks]
      summary: List available target platforms
      description: |
        Returns all valid OS + distribution + architecture + imageType combinations.
        The UI uses this to populate the Target step (radio buttons / dropdowns).
      responses:
        "200":
          description: Available targets grouped by OS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TargetOptions"

  /blocks/disk-presets:
    get:
      tags: [Building Blocks]
      summary: List disk layout presets
      description: |
        Returns predefined disk configurations (e.g., "minimal 4GiB", "large 16GiB with data partition").
        Users can pick a preset or customize from scratch.
      parameters:
        - name: os
          in: query
          schema:
            type: string
          description: Filter presets by OS (some layouts are OS-specific)
        - name: imageType
          in: query
          schema:
            type: string
            enum: [raw, iso, img]
          description: Filter presets by image type
      responses:
        "200":
          description: Disk presets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiskPresetList"

  /blocks/package-groups:
    get:
      tags: [Building Blocks]
      summary: List curated package groups
      description: |
        Returns curated groups of packages (e.g., "Container Runtime", "Kubernetes",
        "Web Server") that users can select via checkboxes. Each group lists the
        individual packages it installs.
      parameters:
        - name: os
          in: query
          required: true
          schema:
            type: string
          description: Target OS (package groups vary by OS)
        - name: dist
          in: query
          required: true
          schema:
            type: string
          description: Target distribution
      responses:
        "200":
          description: Package groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackageGroupList"

  /blocks/kernel-options:
    get:
      tags: [Building Blocks]
      summary: List kernel configuration options
      description: |
        Returns available kernel versions, common cmdline parameters, and
        kernel packages for the given target.
      parameters:
        - name: os
          in: query
          required: true
          schema:
            type: string
        - name: dist
          in: query
          required: true
          schema:
            type: string
        - name: arch
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Kernel options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KernelOptions"

  /blocks/network-presets:
    get:
      tags: [Building Blocks]
      summary: List network configuration presets
      description: |
        Returns common network configurations (DHCP, static, multi-interface)
        and available backends for the target OS.
      parameters:
        - name: os
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Network presets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkPresets"

  /blocks/security-options:
    get:
      tags: [Building Blocks]
      summary: List security and bootloader options
      description: |
        Returns available security features (dm-verity, Secure Boot) and
        bootloader options (EFI/legacy, grub/grub2/systemd-boot) for the target.
      parameters:
        - name: os
          in: query
          required: true
          schema:
            type: string
        - name: imageType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Security options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityOptions"

  # ─────────────────────────────────────────────────────────────────────
  # Package Search
  # ─────────────────────────────────────────────────────────────────────

  /packages/search:
    get:
      tags: [Packages]
      summary: Search available packages
      description: |
        Search for packages available in the repositories for a given target.
        Supports prefix matching and glob patterns. Used by the package search
        input in the builder UI.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          description: Search query (package name prefix or glob pattern)
        - name: os
          in: query
          required: true
          schema:
            type: string
        - name: dist
          in: query
          required: true
          schema:
            type: string
        - name: arch
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Max results to return
      responses:
        "200":
          description: Matching packages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackageSearchResults"

  # ─────────────────────────────────────────────────────────────────────
  # Templates - CRUD
  # ─────────────────────────────────────────────────────────────────────

  /templates:
    get:
      tags: [Templates]
      summary: List all templates
      description: |
        Returns all saved templates (both built-in and user-created).
        Supports filtering by OS, architecture, and image type.
      parameters:
        - name: os
          in: query
          schema:
            type: string
        - name: arch
          in: query
          schema:
            type: string
        - name: imageType
          in: query
          schema:
            type: string
            enum: [raw, iso, img]
        - name: search
          in: query
          schema:
            type: string
          description: Free-text search across name, description, and keywords
      responses:
        "200":
          description: Template list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateList"

    post:
      tags: [Templates]
      summary: Create a new template
      description: |
        Save a new template. The template is validated before saving.
        Returns the saved template with validation results.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateCreateRequest"
      responses:
        "201":
          description: Template created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateSaveResponse"
        "409":
          description: Template with this name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Template validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResponse"

  /templates/{name}:
    get:
      tags: [Templates]
      summary: Get a template by name
      description: Returns the full template YAML and parsed structure.
      parameters:
        - $ref: "#/components/parameters/TemplateName"
      responses:
        "200":
          description: Template details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateDetail"
        "404":
          description: Template not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      tags: [Templates]
      summary: Update an existing template
      description: |
        Replace a template's content. Validates before saving.
      parameters:
        - $ref: "#/components/parameters/TemplateName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateUpdateRequest"
      responses:
        "200":
          description: Template updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateSaveResponse"
        "404":
          description: Template not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Template validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResponse"

    delete:
      tags: [Templates]
      summary: Delete a template
      parameters:
        - $ref: "#/components/parameters/TemplateName"
      responses:
        "204":
          description: Template deleted
        "404":
          description: Template not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Cannot delete built-in templates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /templates/{name}/clone:
    post:
      tags: [Templates]
      summary: Clone a template
      description: |
        Create a copy of an existing template with a new name.
        Useful for starting from an existing template and customizing it.
      parameters:
        - $ref: "#/components/parameters/TemplateName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newName]
              properties:
                newName:
                  type: string
                  pattern: "^[a-zA-Z0-9]([a-zA-Z0-9\\-_]*[a-zA-Z0-9])?$"
                  description: Name for the cloned template
      responses:
        "201":
          description: Template cloned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateSaveResponse"
        "404":
          description: Source template not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Target name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─────────────────────────────────────────────────────────────────────
  # Template Composition (the builder's main endpoint)
  # ─────────────────────────────────────────────────────────────────────

  /templates/compose:
    post:
      tags: [Templates]
      summary: Compose a template from building blocks
      description: |
        Accepts a structured set of building block selections (from the UI's
        wizard or canvas) and generates the final merged YAML template.
        This is the primary endpoint the builder UI calls when the user
        finishes configuring blocks. The response includes the generated YAML,
        validation results, and any warnings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComposeRequest"
      responses:
        "200":
          description: Composed template with validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComposeResponse"
        "400":
          description: Invalid block configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─────────────────────────────────────────────────────────────────────
  # Validation
  # ─────────────────────────────────────────────────────────────────────

  /templates/validate:
    post:
      tags: [Validation]
      summary: Validate a template
      description: |
        Validates template YAML against the ICT schema. Returns detailed
        error and warning information with JSON paths pointing to the
        problematic fields. Used by the live preview panel and the editor.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateRequest"
      responses:
        "200":
          description: Validation results (may be valid or invalid)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResponse"

  /templates/validate/block:
    post:
      tags: [Validation]
      summary: Validate a single building block
      description: |
        Validates just one section of the template (e.g., only the disk
        config or only the network config). Used for inline validation
        as the user configures each block in the wizard/canvas.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockValidateRequest"
      responses:
        "200":
          description: Block validation results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockValidationResponse"

  # ─────────────────────────────────────────────────────────────────────
  # Builds
  # ─────────────────────────────────────────────────────────────────────

  /builds:
    post:
      tags: [Builds]
      summary: Start an image build
      description: |
        Triggers a new image build from a template. The template is validated
        before the build starts. Returns a build ID for tracking progress.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildRequest"
      responses:
        "202":
          description: Build accepted and started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildAccepted"
        "422":
          description: Template validation failed; build not started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResponse"
        "503":
          description: Max concurrent builds reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      tags: [Builds]
      summary: List builds
      description: Returns build history with status, duration, and output info.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [running, success, failed, cancelled]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Build list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildList"

  /builds/{buildId}:
    get:
      tags: [Builds]
      summary: Get build status
      parameters:
        - $ref: "#/components/parameters/BuildId"
      responses:
        "200":
          description: Build details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildDetail"
        "404":
          description: Build not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags: [Builds]
      summary: Cancel a running build
      parameters:
        - $ref: "#/components/parameters/BuildId"
      responses:
        "200":
          description: Build cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildDetail"
        "404":
          description: Build not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Build already completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /builds/{buildId}/logs:
    get:
      tags: [Builds]
      summary: Stream build logs (SSE)
      description: |
        Server-Sent Events stream of build log lines and progress updates.
        Connect to this endpoint to receive real-time build output.

        Event types:
        - `log`: A log line with timestamp, level, and message
        - `progress`: Build phase and percentage
        - `build_complete`: Build finished successfully
        - `build_failed`: Build failed with error details
      parameters:
        - $ref: "#/components/parameters/BuildId"
      responses:
        "200":
          description: SSE stream of build logs
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  SSE events. Example:

                  event: log
                  data: {"timestamp":"2026-06-24T14:32:01Z","level":"info","message":"Installing docker-ce"}

                  event: progress
                  data: {"phase":"installing_packages","percentage":65}

                  event: build_complete
                  data: {"duration_seconds":390,"artifacts":["image.raw","image.raw.gz"]}

# ─────────────────────────────────────────────────────────────────────
# Components
# ─────────────────────────────────────────────────────────────────────

components:
  parameters:
    TemplateName:
      name: name
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-zA-Z0-9]([a-zA-Z0-9\\-_]*[a-zA-Z0-9])?$"
      description: Template name identifier

    BuildId:
      name: buildId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Build identifier

  schemas:
    # ── Building Blocks ──

    TargetOptions:
      type: object
      properties:
        operatingSystems:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                example: azure-linux
              displayName:
                type: string
                example: Azure Linux
              distributions:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      example: azl3
                    displayName:
                      type: string
                      example: Azure Linux 3
                    architectures:
                      type: array
                      items:
                        type: string
                        enum: [x86_64, aarch64, armv7hl]
                    imageTypes:
                      type: array
                      items:
                        type: string
                        enum: [raw, iso, img]

    DiskPresetList:
      type: object
      properties:
        presets:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                example: minimal-4g
              displayName:
                type: string
                example: Minimal (4 GiB)
              description:
                type: string
                example: Two partitions (boot + root), suitable for most use cases
              config:
                $ref: "#/components/schemas/DiskConfig"

    DiskConfig:
      type: object
      properties:
        name:
          type: string
        size:
          type: string
          example: "4GiB"
        partitionTableType:
          type: string
          enum: [gpt, mbr]
        partitions:
          type: array
          items:
            $ref: "#/components/schemas/Partition"
        artifacts:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [raw, qcow2, vhd, vhdx, vmdk, vdi]
              compression:
                type: string
                enum: [gz, xz, zstd, bz2]

    Partition:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        fsType:
          type: string
          example: ext4
        size:
          type: string
          description: "Size or 'rest' for remaining space"
          example: "512MiB"
        mountPoint:
          type: string
          example: /boot
        flags:
          type: array
          items:
            type: string

    PackageGroupList:
      type: object
      properties:
        groups:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                example: container-runtime
              displayName:
                type: string
                example: Container Runtime
              description:
                type: string
                example: Docker CE with CLI and containerd
              packages:
                type: array
                items:
                  type: string
                example: [docker-ce, docker-ce-cli, containerd.io]
              category:
                type: string
                enum: [runtime, networking, monitoring, security, development, web, storage]

    KernelOptions:
      type: object
      properties:
        versions:
          type: array
          items:
            type: object
            properties:
              version:
                type: string
                example: "6.6"
              isDefault:
                type: boolean
        commonCmdlineParams:
          type: array
          items:
            type: object
            properties:
              param:
                type: string
                example: "console=ttyS0,115200"
              description:
                type: string
                example: Serial console output at 115200 baud
              category:
                type: string
                enum: [console, debug, performance, security, hardware]
        additionalPackages:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: kernel-azure
              description:
                type: string

    NetworkPresets:
      type: object
      properties:
        backends:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                enum: [systemd-networkd, netplan]
              displayName:
                type: string
              isDefault:
                type: boolean
        presets:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                example: dhcp-single
              displayName:
                type: string
                example: Single Interface (DHCP)
              description:
                type: string
              config:
                $ref: "#/components/schemas/NetworkConfig"

    NetworkConfig:
      type: object
      properties:
        backend:
          type: string
          enum: [systemd-networkd, netplan]
        interfaces:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: eth0
              dhcp4:
                type: boolean
              dhcp6:
                type: boolean
              addresses:
                type: array
                items:
                  type: string
              routes:
                type: array
                items:
                  type: object
                  properties:
                    to:
                      type: string
                    via:
                      type: string
              nameservers:
                type: array
                items:
                  type: string

    SecurityOptions:
      type: object
      properties:
        immutability:
          type: object
          properties:
            available:
              type: boolean
            description:
              type: string
        secureBoot:
          type: object
          properties:
            available:
              type: boolean
            requiresFiles:
              type: array
              items:
                type: string
              example: [secureBootDBKey, secureBootDBCrt, secureBootDBCer]
        bootloaders:
          type: array
          items:
            type: object
            properties:
              bootType:
                type: string
                enum: [efi, legacy]
              provider:
                type: string
                enum: [grub, grub2, systemd-boot]
              isDefault:
                type: boolean
              description:
                type: string

    # ── Package Search ──

    PackageSearchResults:
      type: object
      properties:
        query:
          type: string
        total:
          type: integer
        packages:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: docker-ce
              version:
                type: string
                example: "24.0.7"
              description:
                type: string
                example: Docker Community Edition
              size:
                type: string
                example: "45 MB"
              repository:
                type: string
                example: docker-ce-stable

    # ── Templates ──

    TemplateList:
      type: object
      properties:
        total:
          type: integer
        templates:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              version:
                type: string
              os:
                type: string
              dist:
                type: string
              arch:
                type: string
              imageType:
                type: string
              description:
                type: string
              keywords:
                type: array
                items:
                  type: string
              isBuiltIn:
                type: boolean
              createdAt:
                type: string
                format: date-time
              updatedAt:
                type: string
                format: date-time

    TemplateDetail:
      type: object
      properties:
        name:
          type: string
        yaml:
          type: string
          description: Raw YAML content
        parsed:
          $ref: "#/components/schemas/ParsedTemplate"
        isBuiltIn:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ParsedTemplate:
      type: object
      description: Structured representation of the template for the UI
      properties:
        image:
          type: object
          properties:
            name:
              type: string
            version:
              type: string
        target:
          type: object
          properties:
            os:
              type: string
            dist:
              type: string
            arch:
              type: string
            imageType:
              type: string
        disk:
          $ref: "#/components/schemas/DiskConfig"
        systemConfig:
          type: object
          properties:
            name:
              type: string
            hostname:
              type: string
            packages:
              type: array
              items:
                type: string
            kernel:
              type: object
              properties:
                version:
                  type: string
                cmdline:
                  type: string
                packages:
                  type: array
                  items:
                    type: string
            network:
              $ref: "#/components/schemas/NetworkConfig"
            users:
              type: array
              items:
                $ref: "#/components/schemas/UserConfig"
            immutability:
              type: object
              properties:
                enabled:
                  type: boolean
            bootloader:
              type: object
              properties:
                bootType:
                  type: string
                provider:
                  type: string
            configurations:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  run:
                    type: string
            additionalFiles:
              type: array
              items:
                type: object
                properties:
                  source:
                    type: string
                  destination:
                    type: string
                  permissions:
                    type: string
        packageRepositories:
          type: array
          items:
            type: object
            properties:
              codename:
                type: string
              url:
                type: string

    UserConfig:
      type: object
      properties:
        name:
          type: string
        groups:
          type: array
          items:
            type: string
        sudo:
          type: boolean
        shell:
          type: string
        home:
          type: string
        hasPassword:
          type: boolean
          description: Whether a password is set (actual value never exposed via API)
        hashAlgo:
          type: string

    TemplateCreateRequest:
      type: object
      required: [name, yaml]
      properties:
        name:
          type: string
          pattern: "^[a-zA-Z0-9]([a-zA-Z0-9\\-_]*[a-zA-Z0-9])?$"
        yaml:
          type: string
          description: Full template YAML content
        description:
          type: string
          description: Human-readable description for the template library

    TemplateUpdateRequest:
      type: object
      required: [yaml]
      properties:
        yaml:
          type: string
        description:
          type: string

    TemplateSaveResponse:
      type: object
      properties:
        name:
          type: string
        validation:
          $ref: "#/components/schemas/ValidationResult"
        createdAt:
          type: string
          format: date-time

    # ── Compose (Builder's main endpoint) ──

    ComposeRequest:
      type: object
      description: |
        Structured input from the builder UI. Each field corresponds to a
        building block the user has configured. Only `image` and `target` are
        required; other blocks use OS defaults when omitted.
      required: [image, target]
      properties:
        image:
          type: object
          required: [name, version]
          properties:
            name:
              type: string
              pattern: "^[a-zA-Z0-9]([a-zA-Z0-9\\-_]*[a-zA-Z0-9])?$"
            version:
              type: string
        target:
          type: object
          required: [os, dist, arch, imageType]
          properties:
            os:
              type: string
              enum: [azure-linux, edge-microvisor-toolkit, wind-river-elxr, ubuntu, redhat-compatible-distro, debian]
            dist:
              type: string
            arch:
              type: string
              enum: [x86_64, aarch64, armv7hl]
            imageType:
              type: string
              enum: [raw, iso, img]
        disk:
          $ref: "#/components/schemas/DiskConfig"
        packages:
          type: array
          items:
            type: string
          description: Packages to install (additive to OS defaults)
        packageRepositories:
          type: array
          items:
            type: object
            properties:
              codename:
                type: string
              url:
                type: string
              pkey:
                type: string
              component:
                type: string
        kernel:
          type: object
          properties:
            version:
              type: string
            cmdline:
              type: string
            packages:
              type: array
              items:
                type: string
        network:
          $ref: "#/components/schemas/NetworkConfig"
        users:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              password:
                type: string
              hashAlgo:
                type: string
              groups:
                type: array
                items:
                  type: string
              sudo:
                type: boolean
              shell:
                type: string
        security:
          type: object
          properties:
            immutability:
              type: object
              properties:
                enabled:
                  type: boolean
                secureBootDBKey:
                  type: string
                secureBootDBCrt:
                  type: string
                secureBootDBCer:
                  type: string
            bootloader:
              type: object
              properties:
                bootType:
                  type: string
                  enum: [efi, legacy]
                provider:
                  type: string
                  enum: [grub, grub2, systemd-boot]
        configurations:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              run:
                type: string
          description: Post-install scripts (executed in order)
        additionalFiles:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              destination:
                type: string
              permissions:
                type: string
        metadata:
          type: object
          properties:
            description:
              type: string
            useCases:
              type: array
              items:
                type: string
            keywords:
              type: array
              items:
                type: string

    ComposeResponse:
      type: object
      properties:
        yaml:
          type: string
          description: Generated YAML template content
        mergedYaml:
          type: string
          description: Fully merged YAML (user selections + OS defaults)
        validation:
          $ref: "#/components/schemas/ValidationResult"
        warnings:
          type: array
          items:
            type: object
            properties:
              block:
                type: string
                description: Which building block the warning is about
              message:
                type: string
              suggestion:
                type: string
        summary:
          type: object
          properties:
            packageCount:
              type: integer
            estimatedImageSize:
              type: string
            partitionCount:
              type: integer
            userCount:
              type: integer

    # ── Validation ──

    ValidateRequest:
      type: object
      required: [yaml]
      properties:
        yaml:
          type: string
          description: Template YAML to validate
        mode:
          type: string
          enum: [user, full]
          default: user
          description: |
            Validation mode:
            - `user`: Validates as a user template (only image + target required)
            - `full`: Validates as a fully merged template (all required fields)

    BlockValidateRequest:
      type: object
      required: [block, config]
      properties:
        block:
          type: string
          enum: [target, disk, packages, kernel, network, users, security, configurations, additionalFiles, packageRepositories]
          description: Which building block to validate
        config:
          type: object
          description: The block configuration to validate (structure depends on block type)
        context:
          type: object
          description: |
            Optional context from other blocks needed for cross-block validation.
            For example, validating packages may need the target OS to check availability.
          properties:
            os:
              type: string
            dist:
              type: string
            arch:
              type: string
            imageType:
              type: string

    BlockValidationResponse:
      type: object
      properties:
        block:
          type: string
        valid:
          type: boolean
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ValidationIssue"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/ValidationIssue"

    ValidationResponse:
      type: object
      properties:
        valid:
          type: boolean
        result:
          $ref: "#/components/schemas/ValidationResult"

    ValidationResult:
      type: object
      properties:
        valid:
          type: boolean
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ValidationIssue"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/ValidationIssue"

    ValidationIssue:
      type: object
      properties:
        path:
          type: string
          description: JSON path to the problematic field
          example: "systemConfig.network.interfaces[0].addresses"
        message:
          type: string
          example: "Static IP address must include CIDR notation (e.g., /24)"
        severity:
          type: string
          enum: [error, warning, info]
        suggestion:
          type: string
          description: Optional fix suggestion for the UI to display
          example: "Add /24 suffix: 192.168.1.10/24"

    # ── Builds ──

    BuildRequest:
      type: object
      properties:
        templateName:
          type: string
          description: Name of a saved template to build
        yaml:
          type: string
          description: Inline YAML to build (alternative to templateName)
        options:
          type: object
          properties:
            workers:
              type: integer
              description: Number of concurrent download workers
              default: 4
            verbose:
              type: boolean
              default: false
      description: |
        Provide either `templateName` (build a saved template) or `yaml`
        (build an inline template). At least one is required.

    BuildAccepted:
      type: object
      properties:
        buildId:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running]
        templateName:
          type: string
        startedAt:
          type: string
          format: date-time
        logsUrl:
          type: string
          description: URL to connect for SSE log streaming
          example: /api/v1/builds/abc-123/logs

    BuildList:
      type: object
      properties:
        total:
          type: integer
        builds:
          type: array
          items:
            $ref: "#/components/schemas/BuildSummary"

    BuildSummary:
      type: object
      properties:
        buildId:
          type: string
        templateName:
          type: string
        status:
          type: string
          enum: [queued, running, success, failed, cancelled]
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        durationSeconds:
          type: integer
        imageSize:
          type: string
          example: "1.2 GB"

    BuildDetail:
      type: object
      properties:
        buildId:
          type: string
        templateName:
          type: string
        status:
          type: string
          enum: [queued, running, success, failed, cancelled]
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        durationSeconds:
          type: integer
        currentPhase:
          type: string
          example: installing_packages
        progress:
          type: integer
          minimum: 0
          maximum: 100
        artifacts:
          type: array
          items:
            type: object
            properties:
              filename:
                type: string
                example: image.raw.gz
              size:
                type: string
                example: "1.2 GB"
              format:
                type: string
        error:
          type: object
          properties:
            message:
              type: string
            phase:
              type: string
            suggestion:
              type: string

    # ── Common ──

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: TEMPLATE_NOT_FOUND
            message:
              type: string
              example: Template "my-image" does not exist
            requestId:
              type: string
