openapi: 3.0.3
info:
  title: ICT Template Builder API
  description: |
    Backend API for the Image Composer Tool (ICT) web-based template builder.

    Architecture: the UI captures the user's selections → the API resolves them to
    a pre-authored ICT template → ICT builds the image, streaming logs back over
    Server-Sent Events.

    This document is the source of truth for the HTTP contract. The Go server
    types and interface in `internal/api/http/` are generated from it with
    oapi-codegen (`go generate ./internal/api/http`), and the TypeScript client
    types in `web/src/api/types.ts` mirror it.

    Not every endpoint is modelled as a JSON operation here. The build-log stream
    (`GET /builds/{id}/logs`) is Server-Sent Events, and the template / log-file /
    artifact downloads return files, so they are hand-written handlers outside the
    generated `ServerInterface` and documented with `text/event-stream` /
    `application/octet-stream` response bodies rather than JSON schemas.
  version: 3.0.0
  contact:
    name: ICT Team

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

tags:
  - name: Manifest
    description: Configuration manifest (all valid combinations + display labels)
  - name: Templates
    description: Resolve a pre-authored template from the user's selections
  - name: Builds
    description: Trigger and monitor image builds

paths:
  # ─────────────────────────────────────────────────────────────────────
  # Manifest
  # ─────────────────────────────────────────────────────────────────────

  /manifest:
    get:
      tags: [Manifest]
      operationId: getManifest
      summary: Get the full configuration manifest
      description: |
        Returns the complete manifest in a single call — all valid combinations of
        vertical/SKU/platform/OS/imageType mapped to their template files, plus
        display labels for each option. The UI loads this once on startup and
        derives the cascading dropdowns locally.
      responses:
        "200":
          description: Full manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Manifest"

  # ─────────────────────────────────────────────────────────────────────
  # Template composition
  # ─────────────────────────────────────────────────────────────────────

  /templates/compose:
    post:
      tags: [Templates]
      operationId: composeTemplate
      summary: Resolve the base template for a set of selections
      description: |
        Accepts the selections (vertical, SKU, platform, OS, image type) and
        returns the matching pre-authored ICT template verbatim, plus a
        human-readable summary for the Review panel. The backend does NOT
        synthesize or merge a template — it looks up the single tested template
        mapped to this combination via the manifest.

        This endpoint is read-only and never modifies the stored template.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComposeRequest"
      responses:
        "200":
          description: Composed template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComposeResponse"
        "400":
          description: Invalid request or no matching combination
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: The matched template failed to load/validate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error resolving or reading the template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─────────────────────────────────────────────────────────────────────
  # Builds
  # ─────────────────────────────────────────────────────────────────────

  /builds:
    get:
      tags: [Builds]
      operationId: listBuilds
      summary: List the compose history
      description: |
        Returns the compose history newest-first. Merges live in-memory builds
        (authoritative for status) with the meta.json records persisted on disk
        (so history survives a server restart).
      responses:
        "200":
          description: Compose history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildList"
    post:
      tags: [Builds]
      operationId: startBuild
      summary: Start an image build
      description: |
        Triggers a new image build. The request is always self-contained (never a
        delta) and carries exactly one of:

        - `compose` — the Basic-tab selections; the backend looks up the matching
          pre-authored template and builds it as-is.
        - `yaml` — the complete edited template from the Advanced tab.

        Returns a build ID for tracking progress via the SSE log stream.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildRequest"
      responses:
        "202":
          description: Build accepted and started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildAccepted"
        "400":
          description: Invalid request or no matching combination
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error creating the build workspace or template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /builds/{id}/details:
    get:
      tags: [Builds]
      operationId: getBuildDetails
      summary: Get a build's command, resolved paths, and summary
      description: |
        Returns the reproducibility/troubleshooting metadata shown in the UI's
        collapsible "Build details" panel: the exact command that ran, the
        resolved template (+ a download URL), the per-build work/cache
        directories, and whether a downloadable log file exists.
      parameters:
        - $ref: "#/components/parameters/BuildId"
      responses:
        "200":
          description: Build details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildDetails"
        "404":
          description: Build not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /builds/{id}/artifacts:
    get:
      tags: [Builds]
      operationId: listBuildArtifacts
      summary: List a build's output artifacts
      description: |
        Returns the output artifacts (image files and SBOM) for a build. Used by
        the artifacts table, and by history rows that are not streaming logs.
      parameters:
        - $ref: "#/components/parameters/BuildId"
      responses:
        "200":
          description: Build artifacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactList"
        "404":
          description: Build not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /builds/{id}/logs:
    get:
      tags: [Builds]
      operationId: streamBuildLogs
      summary: Stream build logs (Server-Sent Events)
      description: |
        A Server-Sent Events stream of the build's log lines and coarse progress.
        Buffered history is replayed on connect, then new lines follow until the
        build finishes with a terminal `complete` or `error` event.

        This is a hand-written streaming handler, not part of the generated
        `ServerInterface` — oapi-codegen does not model `text/event-stream`
        cleanly. Event types:
          - `log`      `{"message": "<line>"}`
          - `phase`    `{"phase": "<id>", "installDone": <n>, "installTotal": <n>}`
          - `complete` `{"status": "success", "artifacts": [Artifact, ...]}`
          - `error`    `{"status": "failed", "message": "<err>"}`
      parameters:
        - $ref: "#/components/parameters/BuildId"
      responses:
        "200":
          description: SSE stream of build logs and progress
          content:
            text/event-stream:
              schema:
                type: string
        "404":
          description: Build not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /builds/{id}/template:
    get:
      tags: [Builds]
      operationId: downloadBuildTemplate
      summary: Download the exact template that was built
      description: |
        Serves the resolved template YAML that was built, as a file download, so
        the operator can inspect or reuse it. Hand-written handler (file download),
        outside the generated `ServerInterface`.
      parameters:
        - $ref: "#/components/parameters/BuildId"
      responses:
        "200":
          description: The template file
          content:
            application/yaml:
              schema:
                type: string
        "404":
          description: Build or template not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /builds/{id}/logfile:
    get:
      tags: [Builds]
      operationId: downloadBuildLogFile
      summary: Download the persisted compose log
      description: |
        Serves the persisted compose log as a text download. Available once a build
        has finished (the log file is written at completion). Hand-written handler
        (file download), outside the generated `ServerInterface`.
      parameters:
        - $ref: "#/components/parameters/BuildId"
      responses:
        "200":
          description: The compose log
          content:
            text/plain:
              schema:
                type: string
        "404":
          description: Build or log file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /builds/{id}/artifacts/{name}:
    get:
      tags: [Builds]
      operationId: downloadBuildArtifact
      summary: Download a single build artifact by name
      description: |
        Serves one artifact (image or SBOM) as a binary download. The artifact must
        be in the build's recorded artifact list and resolve inside the build's
        work directory — arbitrary paths are rejected. Hand-written handler (binary
        download), outside the generated `ServerInterface`.
      parameters:
        - $ref: "#/components/parameters/BuildId"
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Artifact file name (must be in the build's artifact list)
      responses:
        "200":
          description: The artifact bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "403":
          description: Artifact path escapes the build workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Build or artifact not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

# ─────────────────────────────────────────────────────────────────────
# Components
# ─────────────────────────────────────────────────────────────────────

components:
  parameters:
    BuildId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Build identifier (UUID)

  schemas:
    # ── Manifest ──

    Option:
      type: object
      description: A generic {id, displayName} pair used for dropdown labels.
      required: [id, displayName]
      properties:
        id:
          type: string
        displayName:
          type: string

    Target:
      type: object
      description: An OS option with its family and architecture.
      required: [id, displayName, os, arch]
      properties:
        id:
          type: string
        displayName:
          type: string
        os:
          type: string
        arch:
          type: string

    Combination:
      type: object
      description: Maps one valid UI selection to a pre-authored template file.
      required: [vertical, platform, os, imageType, template]
      properties:
        vertical:
          type: string
        sku:
          type: string
        platform:
          type: string
        os:
          type: string
        imageType:
          type: string
        template:
          type: string
          description: Filename in the templates directory
          example: ubuntu24-x86_64-robotics-jazzy-iso.yml

    Manifest:
      type: object
      description: |
        The complete configuration manifest, loaded once by the UI on startup.
      required: [combinations, verticals, skus, platforms, targets]
      properties:
        combinations:
          type: array
          items:
            $ref: "#/components/schemas/Combination"
        verticals:
          type: array
          items:
            $ref: "#/components/schemas/Option"
        skus:
          type: array
          items:
            $ref: "#/components/schemas/Option"
        platforms:
          type: array
          items:
            $ref: "#/components/schemas/Option"
        targets:
          type: array
          items:
            $ref: "#/components/schemas/Target"

    # ── Template composition ──

    ComposeRequest:
      type: object
      description: |
        The UI selections that identify one combination. The backend uses these to
        look up the matching pre-authored template in the manifest.
      required: [vertical, platform, os, imageType]
      properties:
        vertical:
          type: string
        sku:
          type: string
        platform:
          type: string
        os:
          type: string
        imageType:
          type: string

    ComposeSummary:
      type: object
      description: |
        The human-readable summary shown in the Review panel and stored on the
        build record for the Build Details panel.
      required:
        - vertical
        - sku
        - platform
        - os
        - imageType
        - imageName
        - imageVersion
        - description
        - architecture
        - kernelVersion
        - packageCount
        - diskSize
        - partitionCount
        - partitionTable
        - hostname
      properties:
        # Selection echo — what the user chose
        vertical:
          type: string
        sku:
          type: string
        platform:
          type: string
        os:
          type: string
        imageType:
          type: string
        # Template-derived — info the user can't see from the dropdowns
        imageName:
          type: string
        imageVersion:
          type: string
        description:
          type: string
        architecture:
          type: string
        kernelVersion:
          type: string
        packageCount:
          type: integer
        diskSize:
          type: string
        partitionCount:
          type: integer
        partitionTable:
          type: string
        hostname:
          type: string
        baseImage:
          type: string
          description: Overlay-mode only — the baseline image packages are layered onto.

    ComposeResponse:
      type: object
      required: [template, yaml, summary]
      properties:
        template:
          type: string
          description: Resolved template filename
        yaml:
          type: string
          description: The matched template's YAML, verbatim
        summary:
          $ref: "#/components/schemas/ComposeSummary"

    # ── Builds ──

    BuildRequest:
      type: object
      description: |
        Start a build. Carries exactly one of `compose` or `yaml` — never a diff.
      properties:
        compose:
          $ref: "#/components/schemas/ComposeRequest"
        yaml:
          type: string
          description: Complete template YAML (Advanced tab). Self-contained, not a delta.

    BuildAccepted:
      type: object
      required: [buildId, status, logsUrl]
      properties:
        buildId:
          type: string
        status:
          type: string
          example: running
        logsUrl:
          type: string
          description: SSE endpoint for streaming logs
          example: /api/v1/builds/abc-123/logs

    Artifact:
      type: object
      required: [name, type, path]
      properties:
        name:
          type: string
          example: ubuntu24-robotics-amr.raw.gz
        type:
          type: string
          enum: [image, sbom]
        path:
          type: string
        size:
          type: string
          description: Human-readable size, e.g. "1.13 GB"
          example: "1.13 GB"

    ArtifactList:
      type: object
      required: [buildId, status, artifacts]
      properties:
        buildId:
          type: string
        status:
          type: string
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/Artifact"

    BuildDetails:
      type: object
      required:
        - buildId
        - status
        - command
        - template
        - templateUrl
        - workDir
        - cacheDir
        - hasLogFile
      properties:
        buildId:
          type: string
        status:
          type: string
          enum: [running, success, failed]
        command:
          type: string
          description: The exact command that ran, for the troubleshoot panel
        template:
          type: string
        templateUrl:
          type: string
          description: Download URL for the resolved template
        workDir:
          type: string
        cacheDir:
          type: string
        summary:
          $ref: "#/components/schemas/ComposeSummary"
        hasLogFile:
          type: boolean
          description: A downloadable log file exists on disk
        errMsg:
          type: string

    HistoryItem:
      type: object
      description: One row in the compose history list.
      required: [id, status, template, createdAt]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [running, success, failed]
        template:
          type: string
        createdAt:
          type: string
          format: date-time
        summary:
          $ref: "#/components/schemas/ComposeSummary"

    BuildList:
      type: object
      required: [builds]
      properties:
        builds:
          type: array
          items:
            $ref: "#/components/schemas/HistoryItem"

    # ── Common ──

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: NOT_FOUND
            message:
              type: string
              example: build not found
