  <!-- Connection arrows -->
  <line x1="450" y1="255" x2="450" y2="270" stroke="#d97706" stroke-width="2" marker-end="url(#arrowA)"/>
  <line x1="450" y1="320" x2="450" y2="335" stroke="#0d9488" stroke-width="2" marker-end="url(#arrowT)"/>
