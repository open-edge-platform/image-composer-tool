  <text x="510" y="580" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#be123c">ESLint + Prettier</text>

  <rect x="590" y="565" width="110" height="22" rx="4" fill="#ffffff" stroke="#fb7185" stroke-width="1"/>
  <text x="645" y="580" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#be123c">oapi-codegen</text>

  <rect x="715" y="565" width="110" height="22" rx="4" fill="#ffffff" stroke="#fb7185" stroke-width="1"/>
