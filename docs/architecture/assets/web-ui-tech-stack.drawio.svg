  <rect x="50" y="575" width="100" height="22" rx="4" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
  <text x="100" y="590" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#dc2626">pnpm</text>

  <rect x="165" y="575" width="100" height="22" rx="4" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
  <text x="215" y="590" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#dc2626">Vitest</text>

  <rect x="280" y="575" width="100" height="22" rx="4" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
  <text x="330" y="590" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#dc2626">Playwright</text>

  <rect x="395" y="575" width="120" height="22" rx="4" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
  <text x="455" y="590" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#dc2626">ESLint + Prettier</text>

  <rect x="530" y="575" width="110" height="22" rx="4" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
  <text x="585" y="590" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#dc2626">oapi-codegen</text>

  <rect x="655" y="575" width="100" height="22" rx="4" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
  <text x="705" y="590" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#dc2626">air (hot-reload)</text>

  <rect x="770" y="575" width="100" height="22" rx="4" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
  <text x="820" y="590" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#dc2626">Docker</text>

  <!-- Connection arrows -->
  <!-- Frontend to Communication -->
  <line x1="450" y1="255" x2="450" y2="270" stroke="#ca8a04" stroke-width="2" marker-end="url(#arrowY)"/>
  <!-- Communication to Backend -->
  <line x1="450" y1="320" x2="450" y2="335" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowG)"/>

  <defs>
    <marker id="arrowY" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ca8a04"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#16a34a"/>
    </marker>
  </defs>
