  <text x="325" y="495" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#16a34a">CRUD + compose + validate</text>

  <rect x="430" y="455" width="170" height="50" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="515" y="478" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#166534">/builds/* endpoints</text>
  <text x="515" y="495" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#16a34a">Trigger + SSE logs</text>

  <rect x="620" y="455" width="170" height="50" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="705" y="478" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#166534">/packages/search</text>
  <text x="705" y="495" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#16a34a">Autocomplete + repo info</text>

