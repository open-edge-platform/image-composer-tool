<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     version="1.1" width="900" height="620" viewBox="-10 -10 920 640">
  <defs/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#1e293b">ICT Web UI - Tech Stack Architecture</text>

  <!-- ═══ FRONTEND LAYER ═══ -->
  <rect x="20" y="55" width="860" height="200" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2" stroke-dasharray="none"/>
  <text x="40" y="80" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#2563eb">FRONTEND (web/)</text>

  <!-- React -->
  <rect x="50" y="95" width="140" height="60" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="120" y="122" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e293b">React 18</text>
  <text x="120" y="140" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">TypeScript SPA</text>

  <!-- Vite -->
  <rect x="210" y="95" width="140" height="60" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="280" y="122" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Vite 6</text>
  <text x="280" y="140" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Build + HMR</text>

  <!-- Shadcn/ui -->
  <rect x="370" y="95" width="140" height="60" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
  <text x="440" y="122" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Shadcn/ui</text>
  <text x="440" y="140" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Radix + Tailwind</text>

  <!-- Zustand -->
  <rect x="530" y="95" width="140" height="60" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
