<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     version="1.1" width="800" height="520" viewBox="-10 -10 820 540">

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#334155">Template Builder Data Flow</text>

  <!-- USER -->
  <ellipse cx="400" cy="75" rx="60" ry="25" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="80" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#475569">User</text>

  <!-- Arrow: User to UI -->
  <line x1="400" y1="100" x2="400" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ UI LAYER ═══ -->
  <rect x="100" y="130" width="600" height="110" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="120" y="152" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#4f46e5">BROWSER (React + Zustand)</text>

  <!-- Basic Tab -->
  <rect x="120" y="165" width="130" height="55" rx="6" fill="#ffffff" stroke="#818cf8" stroke-width="1.5"/>
  <text x="185" y="185" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#4338ca">Basic Tab</text>
  <text x="185" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Vertical, SKU,</text>
  <text x="185" y="212" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Platform, OS, Review</text>

  <!-- Advanced Tab -->
  <rect x="270" y="165" width="130" height="55" rx="6" fill="#ffffff" stroke="#818cf8" stroke-width="1.5"/>
  <text x="335" y="185" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#4338ca">Advanced Tab</text>
  <text x="335" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Image type, packages,</text>
  <text x="335" y="212" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">disk layout</text>

  <!-- Zustand Store -->
  <rect x="420" y="165" width="120" height="55" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="480" y="185" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#92400e">Zustand Store</text>
  <text x="480" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">UI selections +</text>
  <text x="480" y="212" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Basic&#8594;Advanced sync</text>

  <!-- YAML Preview -->
  <rect x="560" y="165" width="120" height="55" rx="6" fill="#ffffff" stroke="#818cf8" stroke-width="1.5"/>
  <text x="620" y="185" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#4338ca">YAML Preview</text>
  <text x="620" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">CodeMirror (read-only)</text>
  <text x="620" y="212" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Advanced tab</text>

  <!-- Arrows within UI -->
  <line x1="250" y1="192" x2="268" y2="192" stroke="#a5b4fc" stroke-width="1" marker-end="url(#arrs)"/>
  <line x1="400" y1="192" x2="418" y2="192" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrO)"/>
  <line x1="540" y1="192" x2="558" y2="192" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arrP)"/>

  <!-- ═══ API CALLS ═══ -->
  <!-- Arrow: UI to Backend (left - compose) -->
  <line x1="290" y1="240" x2="290" y2="290" stroke="#0d9488" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="295" y="270" font-family="Inter, sans-serif" font-size="9" fill="#0f766e">POST /templates/compose</text>

  <!-- Arrow: UI to Backend (right - build) -->
  <line x1="560" y1="240" x2="560" y2="290" stroke="#e11d48" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="565" y="270" font-family="Inter, sans-serif" font-size="9" fill="#be123c">POST /builds</text>

  <!-- ═══ BACKEND LAYER ═══ -->
  <rect x="100" y="290" width="600" height="120" rx="10" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
  <text x="120" y="312" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0f766e">GO BACKEND (net/http + internal/api)</text>

  <!-- Compose Handler -->
  <rect x="150" y="325" width="200" height="65" rx="6" fill="#ffffff" stroke="#5eead4" stroke-width="1.5"/>
  <text x="250" y="347" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0f766e">Compose Handler</text>
  <text x="250" y="363" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Selections &#8594; manifest lookup</text>
  <text x="250" y="377" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Returns matched template YAML</text>

  <!-- Build Handler -->
  <rect x="450" y="325" width="200" height="65" rx="6" fill="#ffffff" stroke="#fb7185" stroke-width="1.5"/>
  <text x="550" y="347" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#be123c">Build Handler (ICT Adapter)</text>
  <text x="550" y="363" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">os/exec subprocess</text>
  <text x="550" y="377" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">SSE log streaming</text>

  <!-- ═══ DATA STORES ═══ -->
  <line x1="250" y1="410" x2="250" y2="445" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="550" y1="410" x2="550" y2="445" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Templates Store -->
  <rect x="150" y="445" width="200" height="45" rx="20" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="250" y="465" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#92400e">image-templates/</text>
  <text x="250" y="480" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#b45309">Pre-authored template per combination</text>

  <!-- Build Output -->
  <rect x="450" y="445" width="200" height="45" rx="20" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="550" y="465" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#92400e">Build output</text>
  <text x="550" y="480" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#b45309">Image + SBOM artifacts</text>

  <!-- SSE return arrow -->
  <path d="M 660 360 Q 720 360 720 270 Q 720 240 620 240" fill="none" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrR)"/>
  <text x="730" y="300" font-family="Inter, sans-serif" font-size="9" fill="#be123c" transform="rotate(90, 730, 300)">SSE stream</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/></marker>
    <marker id="arrs" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><polygon points="0 0, 6 2, 0 4" fill="#a5b4fc"/></marker>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#0d9488"/></marker>
    <marker id="arrR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#e11d48"/></marker>
    <marker id="arrO" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><polygon points="0 0, 6 2, 0 4" fill="#d97706"/></marker>
    <marker id="arrP" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><polygon points="0 0, 6 2, 0 4" fill="#818cf8"/></marker>
  </defs>
</svg>
