<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     version="1.1" width="900" height="760" viewBox="-10 -10 920 780">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0, 9 3.5, 0 7" fill="#334155"/></marker>
    <marker id="ar" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0, 9 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="ab" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0, 9 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="ao" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0, 9 3.5, 0 7" fill="#ca8a04"/></marker>
  </defs>

  <!-- Title -->
  <text x="450" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#1e293b">API Call &amp; ICT Build Sequence</text>

  <!-- ═══ Actor / lifeline headers ═══ -->
  <!-- User -->
  <rect x="30" y="45" width="130" height="40" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="95" y="70" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#334155">User (Browser)</text>

  <!-- React SPA -->
  <rect x="200" y="45" width="130" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="265" y="70" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e40af">React SPA</text>

  <!-- API server -->
  <rect x="380" y="45" width="140" height="40" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="450" y="70" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#166534">API (internal/api)</text>

  <!-- Manifest + templates -->
  <rect x="565" y="45" width="140" height="40" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="635" y="65" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#854d0e">manifest.yaml +</text>
  <text x="635" y="79" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#854d0e">image-templates/</text>

  <!-- ICT binary -->
  <rect x="750" y="45" width="130" height="40" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="815" y="65" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#991b1b">ICT binary</text>
  <text x="815" y="79" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#991b1b">(os/exec)</text>

  <!-- ═══ Lifelines ═══ -->
  <line x1="95"  y1="85" x2="95"  y2="720" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="265" y1="85" x2="265" y2="720" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="450" y1="85" x2="450" y2="720" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="635" y1="85" x2="635" y2="720" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="815" y1="85" x2="815" y2="720" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- ═══ PHASE 1: Load options ═══ -->
  <text x="30" y="112" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#2563eb">1 · Load Basic-tab options</text>

  <line x1="265" y1="126" x2="448" y2="126" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="270" y="121" font-family="Inter, sans-serif" font-size="10" fill="#1e40af">GET /verticals, /platforms, /targets</text>

  <line x1="450" y1="150" x2="633" y2="150" stroke="#16a34a" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="455" y="145" font-family="Inter, sans-serif" font-size="10" fill="#166534">read distinct combinations</text>

  <line x1="633" y1="172" x2="452" y2="172" stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ao)"/>
  <text x="455" y="167" font-family="Inter, sans-serif" font-size="10" fill="#854d0e">valid options</text>

  <line x1="448" y1="194" x2="267" y2="194" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ar)"/>
  <text x="270" y="189" font-family="Inter, sans-serif" font-size="10" fill="#166534">JSON &#8594; populate dropdowns</text>

  <line x1="235" y1="60" x2="180" y2="60" stroke="#334155" stroke-width="0" />
  <line x1="95" y1="216" x2="263" y2="216" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="100" y="211" font-family="Inter, sans-serif" font-size="10" fill="#334155">selects vertical/SKU/platform/OS</text>

  <!-- ═══ PHASE 2: Review / compose ═══ -->
  <line x1="20" y1="240" x2="880" y2="240" stroke="#e2e8f0" stroke-width="1"/>
  <text x="30" y="258" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#2563eb">2 · Review / Export (compose)</text>

  <line x1="265" y1="272" x2="448" y2="272" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="270" y="267" font-family="Inter, sans-serif" font-size="10" fill="#1e40af">POST /templates/compose {selections}</text>

  <line x1="450" y1="294" x2="633" y2="294" stroke="#16a34a" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="455" y="289" font-family="Inter, sans-serif" font-size="10" fill="#166534">lookup template by combination</text>

  <line x1="633" y1="316" x2="452" y2="316" stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ao)"/>
  <text x="455" y="311" font-family="Inter, sans-serif" font-size="10" fill="#854d0e">matched template YAML</text>

  <line x1="448" y1="338" x2="267" y2="338" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ar)"/>
  <text x="270" y="333" font-family="Inter, sans-serif" font-size="10" fill="#166534">YAML + summary (Review / preview)</text>

  <!-- ═══ PHASE 3: Build ═══ -->
  <line x1="20" y1="362" x2="880" y2="362" stroke="#e2e8f0" stroke-width="1"/>
  <text x="30" y="380" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#dc2626">3 · Build Image</text>

  <line x1="95" y1="400" x2="263" y2="400" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="100" y="395" font-family="Inter, sans-serif" font-size="10" fill="#334155">clicks Build Image</text>

  <line x1="265" y1="422" x2="448" y2="422" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="270" y="417" font-family="Inter, sans-serif" font-size="10" fill="#1e40af">POST /builds {compose | yaml}</text>

  <line x1="450" y1="444" x2="633" y2="444" stroke="#16a34a" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="455" y="439" font-family="Inter, sans-serif" font-size="10" fill="#166534">resolve template file</text>

  <line x1="450" y1="470" x2="813" y2="470" stroke="#16a34a" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="455" y="465" font-family="Inter, sans-serif" font-size="10" fill="#166534">os/exec: image-composer-tool build &lt;template&gt;</text>

  <line x1="448" y1="494" x2="267" y2="494" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ar)"/>
  <text x="270" y="489" font-family="Inter, sans-serif" font-size="10" fill="#166534">202 {buildId, logsUrl}</text>

  <!-- SSE subscribe -->
  <line x1="265" y1="516" x2="448" y2="516" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="270" y="511" font-family="Inter, sans-serif" font-size="10" fill="#1e40af">GET /builds/{id}/logs (SSE, EventSource)</text>

  <!-- ICT streaming stdout loop -->
  <rect x="430" y="532" width="410" height="96" rx="6" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="438" y="546" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#64748b">loop  [while build running]</text>

  <line x1="813" y1="566" x2="452" y2="566" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
  <text x="455" y="561" font-family="Inter, sans-serif" font-size="10" fill="#991b1b">stdout/stderr line</text>

  <line x1="448" y1="592" x2="267" y2="592" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ab)"/>
  <text x="270" y="587" font-family="Inter, sans-serif" font-size="10" fill="#1e40af">event: log {message} &#8594; append to viewer</text>

  <line x1="815" y1="612" x2="452" y2="612" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
  <text x="455" y="607" font-family="Inter, sans-serif" font-size="10" fill="#991b1b">exit code 0 (build complete)</text>

  <!-- complete event -->
  <line x1="448" y1="650" x2="267" y2="650" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ab)"/>
  <text x="270" y="645" font-family="Inter, sans-serif" font-size="10" fill="#1e40af">event: complete {status, artifacts[]}</text>

  <line x1="265" y1="674" x2="448" y2="674" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="270" y="669" font-family="Inter, sans-serif" font-size="10" fill="#1e40af">GET /builds/{id}/artifacts</text>

  <line x1="448" y1="696" x2="267" y2="696" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ar)"/>
  <text x="270" y="691" font-family="Inter, sans-serif" font-size="10" fill="#166534">Image + SBOM (name, type, path) &#8594; table</text>

  <line x1="95" y1="716" x2="263" y2="716" stroke="#334155" stroke-width="0"/>
  <text x="100" y="713" font-family="Inter, sans-serif" font-size="10" fill="#334155">views logs live + copies artifact paths</text>
</svg>
