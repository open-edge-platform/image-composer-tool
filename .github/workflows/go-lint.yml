name: Go Lint

on:
  workflow_dispatch:
  
  pull_request:
    paths:
      - '**/*.go'
      - 'api/v1/*.yaml'
  push:
    branches:
      - main
    paths:
      - '**/*.go'
      - 'api/v1/*.yaml'

permissions:
  contents: read

jobs:
  lint:
    name: Linting
    runs-on: ["ubuntu-latest"]
    container: ubuntu:24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 #v7.0.1
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y curl ca-certificates
          update-ca-certificates

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e #v7.0.0
        with:
          go-version: '1.25'

      - name: Install golangci-lint
        run: |
          GOBIN="$PWD/bin" go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.2
          ./bin/golangci-lint version
          ./bin/golangci-lint version | grep -q 'built with go1.25' || {
            echo "golangci-lint binary is not built with Go 1.25." >&2
            exit 1
          }
          echo "$PWD/bin" >> $GITHUB_PATH

      - name: Verify generated OpenAPI code is up to date
        run: |
          cp internal/api/http/gen.go /tmp/gen.go.committed
          go generate ./internal/api/http
          diff -u /tmp/gen.go.committed internal/api/http/gen.go || {
            echo "::error::internal/api/http/gen.go is stale. Run 'go generate ./internal/api/http' and commit the result." >&2
            exit 1
          }

      - name: Run golangci-lint
        run: golangci-lint run ./...

