name: Fuzz Test

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      fuzz_time:
        description: "Fuzz duration for each target (for example: 30s, 1m, 5m)"
        required: false
        default: "30s"

permissions:
  contents: read

jobs:
  fuzz-test:
    name: Run Fuzz Tests
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e #v7.0.0
        with:
          go-version: '1.25'

      - name: Prepare fuzz runner
        run: |
          chmod +x ./run_fuzz_tests.sh

      - name: Run fuzz tests
        env:
          FUZZ_TIME: ${{ github.event.inputs.fuzz_time }}
        run: |
          ./run_fuzz_tests.sh

      - name: Upload fuzz report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: fuzz-test-report-${{ github.run_id }}
          path: fuzz_test_report_*.md
          if-no-files-found: warn
          retention-days: 14